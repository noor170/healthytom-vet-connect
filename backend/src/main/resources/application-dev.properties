spring.application.name=vet-connect

# Server Configuration
server.port=8080
server.servlet.context-path=/api

# Database Configuration (PostgreSQL for development)
spring.datasource.url=jdbc:postgresql://localhost:5432/vet_connect
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=macbookairm1
spring.datasource.password=

# JPA/Hibernate Configuration
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.defer-datasource-initialization=true

# SQL Initialization (Load demo data after Hibernate creates tables)
spring.sql.init.mode=always
spring.sql.init.data-locations=classpath:data.sql

# JWT Configuration
app.jwt.secret=dev-jwt-secret-key-for-testing-purposes-only-change-in-production
app.jwt.expiration=86400000
app.jwt.refresh.expiration=604800000

# Logging
logging.level.root=INFO
logging.level.com.healthytom=DEBUG
logging.level.org.springframework.security=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# File Upload
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Actuator
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always
