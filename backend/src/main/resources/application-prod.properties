spring.application.name=vet-connect

# Server Configuration
server.port=8080
server.servlet.context-path=/api
server.compression.enabled=true
server.compression.min-response-size=1024

# Database Configuration (PostgreSQL)
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/vet_connect}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.idle-timeout=600000

# JPA/Hibernate Configuration
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

# JWT Configuration
app.jwt.secret=${APP_JWT_SECRET:your-super-secret-jwt-key-change-this-in-production-must-be-at-least-256-bits-long}
app.jwt.expiration=${APP_JWT_EXPIRATION:86400000}
app.jwt.refresh.expiration=${APP_JWT_REFRESH_EXPIRATION:604800000}

# Logging
logging.level.root=WARN
logging.level.com.healthytom=INFO
logging.level.org.springframework.security=WARN
logging.file.name=logs/vet-connect.log
logging.logback.rollingpolicy.max-file-size=10MB
logging.logback.rollingpolicy.max-history=30

# File Upload
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Actuator
management.endpoints.web.exposure.include=health,metrics
management.endpoint.health.show-details=when-authorized
management.metrics.export.simple.enabled=true

# Application
spring.application.name=vet-connect-api
app.version=1.0.0
# ========== Firebase Configuration ==========
# Firebase is the primary backend for production
firebase.enabled=true

# Firebase Credentials
# Path to Firebase service account JSON key file
firebase.credentials.path=classpath:firebase-credentials.json

# Firebase Project Configuration
firebase.project-id=healthytom-vet-connect
firebase.database-url=${FIREBASE_DATABASE_URL}
firebase.storage.bucket=${FIREBASE_STORAGE_BUCKET}
firebase.api-key=${FIREBASE_API_KEY}
firebase.auth-domain=${FIREBASE_AUTH_DOMAIN}
firebase.messaging-sender-id=100368986720217027425
firebase.app-id=${FIREBASE_APP_ID}

# Firestore Database Configuration
firebase.firestore.enabled=true
firebase.firestore.collection-prefix=prod_
firebase.firestore.auto-initialize=true

# Firebase Storage Configuration
firebase.storage.enabled=true
firebase.storage.max-file-size=52428800
firebase.storage.path-prefix=prod/
firebase.storage.retry-attempts=3
firebase.storage.retry-delay=1000

# Firebase Authentication Configuration
firebase.auth.enabled=true
firebase.auth.session-timeout=3600000
firebase.auth.token-refresh-interval=300000
firebase.auth.email-verification-enabled=true
firebase.auth.password-reset-enabled=true

# Firebase Realtime Database Configuration (if used)
firebase.realtime-db.enabled=false
firebase.realtime-db.connection-timeout=5000

# Firebase Cloud Messaging Configuration (for notifications)
firebase.messaging.enabled=true
firebase.messaging.server-key=${FIREBASE_SERVER_KEY}

# Email Configuration (for notifications via Firebase)
mail.enabled=true
mail.sender-email=${ADMIN_EMAIL}
mail.sender-name=Healthy Tom Vet Connect
mail.notification-email=${NOTIFICATION_EMAIL}

# Security Configuration
spring.security.require-https=true
security.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:https://healthytom.com}
security.cors.allowed-methods=GET,POST,PUT,DELETE,PATCH,OPTIONS
security.cors.max-age=3600

# Rate Limiting
security.rate-limit.enabled=true
security.rate-limit.requests-per-minute=100

# Cache Configuration (using Redis with Firebase)
spring.cache.type=redis
spring.redis.host=${REDIS_HOST}
spring.redis.port=${REDIS_PORT:6379}
spring.redis.password=${REDIS_PASSWORD}
spring.redis.timeout=2000
spring.cache.redis.time-to-live=3600000

# Firebase Data Sync Configuration
firebase.sync.enabled=true
firebase.sync.batch-size=100
firebase.sync.retry-policy=exponential
firebase.sync.max-retries=3

# Application Environment
app.environment=production
app.debug=false