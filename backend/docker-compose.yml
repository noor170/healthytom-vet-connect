version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: vet-connect-db
    environment:
      POSTGRES_DB: vet_connect
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - vet-connect-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: vet-connect-api
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/vet_connect
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      SERVER_PORT: 8080
      APP_JWT_SECRET: your-super-secret-jwt-key-change-this-in-production-must-be-at-least-256-bits-long
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - vet-connect-network
    restart: unless-stopped

networks:
  vet-connect-network:
    driver: bridge

volumes:
  postgres_data:
    driver: local
